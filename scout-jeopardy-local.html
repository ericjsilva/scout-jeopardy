<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scout Game Show Jeopardy Template (File Compatible)</title>
    <meta name="ROBOTS" content="NOODP" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="styles/styles.css" />
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/autogrow.js"></script>
    <script src="js/simplemodal.js"></script>
    <script src="js/game-core.js"></script>
    <script src="js/game-embedded.js"></script>
</head>

<body>
    <table id="game" cellspacing="5" cellpadding="0" class="hide">
        <thead>
            <tr id="category-headers">
                <!-- Categories will be dynamically populated here -->
            </tr>
        </thead>
        <tbody id="game-board">
            <!-- Game board will be dynamically populated here -->
        </tbody>
    </table>
    <div id="options">
        <h1>Scout Jeopardy</h1>
        <label>Number of Patrols</label>
        <select name="teams" id="teams">
            <!-- Team options will be dynamically populated here -->
        </select>
        <input class="submit" type="button" id="submit" value="Start" onclick="game.init()" />
        <input class="submit" type="button" id="fullscreen" value="Full Screen" onclick="game.toggleFullScreen()" />
        <input class="submit" type="button" id="playtheme" value="Play Music" onclick="game.playTheme()" /> &nbsp;&nbsp;
        <input class="submit" type="button" id="stoptheme" value="Stop Music" onclick="game.stopTheme()" />
        <div class="clear"></div>
    </div>
    <div id="stats">
    </div>
    <div id="modal" class="hide">
        <textarea id="question" placeholder="Enter Question"></textarea>
        <textarea id="answer" placeholder="Enter Answer"></textarea>
        <input type="button" value="Save" onclick="modal.save(); $.modal.close();" />
    </div>
    <div id="prompt">
        <h2 id="prompt-answer"></h2>
        <p><span id="correct-response"><a href="javascript:prompt.showQuestion()">Correct Response</a>
                &nbsp;&nbsp;&nbsp;&nbsp; </span><a
                href="javascript:prompt.hide()">Continue</a>&nbsp;&nbsp;&nbsp;&nbsp;<a
                href="javascript:prompt.noAnswer()">No Answer</a></p>
        <h2 id="prompt-question"></h2>
    </div>
</body>

</html>
